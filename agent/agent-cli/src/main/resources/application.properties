# ═══════════════════════════════════════════════════════════
# Gamelan CLI Application Configuration
# ═══════════════════════════════════════════════════════════

# ── Gamelan Engine Configuration ─────────────────────────
gamelan.engine.mode=auto
gamelan.remote.url=
gamelan.api.key=community
gamelan.request.timeout.seconds=120

# ── Tool Configuration ───────────────────────────────────
gamelan.tools.approval-mode=auto
gamelan.tools.sandbox-enabled=false
gamelan.tools.trusted=
gamelan.tools.blocked=

# ── Skills Configuration ─────────────────────────────────
gamelan.skills.dir=

# ── Gollek Hub Configuration ─────────────────────────────
gollek.hub.token=

# ── Logging Configuration ────────────────────────────────
quarkus.log.console.format=%-5p [%c{2.}] %s%e%n
quarkus.log.category."tech.kayys.gamelan".level=INFO
quarkus.log.category."tech.kayys.gollek".level=INFO
quarkus.log.console.json=false
