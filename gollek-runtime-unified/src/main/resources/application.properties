# Configuration for the unified Gollek runtime

# Quarkus configuration
quarkus.application.name=gollek-unified-runtime
quarkus.application.version=1.0.0
gollek.distribution.mode=unified

# ── Demo / Community defaults ─────────────────────────────────────────────────
# Defaults to 'none' for tokens in demo mode to satisfy config loading requirements
gollek.rag.default-llm-model=${GOLLEK_RAG_LLM_MODEL:Qwen/Qwen2.5-0.5B-Instruct}
gollek.rag.default-embedding-model=${GOLLEK_RAG_EMBEDDING_MODEL:sentence-transformers/all-MiniLM-L6-v2}
gollek.audio.whisper.default-model=${GOLLEK_WHISPER_MODEL:openai/whisper-tiny}
gollek.hub.token=none
gollek.admin.api-key=none
# ─────────────────────────────────────────────────────────────────────────────


# HTTP configuration
quarkus.http.port=8080
quarkus.http.cors.enabled=true

# Enable REST endpoints
quarkus.rest.path=/api

# OpenAPI and Swagger UI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Health check
quarkus.smallrye-health.root-path=/health
quarkus.smallrye-health.ui.root-path=/health-ui

# Metrics
quarkus.micrometer.enabled=${GOLLEK_METRICS_ENABLED:true}
quarkus.micrometer.export.prometheus.enabled=${GOLLEK_PROMETHEUS_ENABLED:true}
quarkus.micrometer.export.prometheus.path=/metrics

# Logging
quarkus.log.level=INFO
quarkus.console.color=true
# Removed legacy ai.enterprise references

# OpenTelemetry configuration
quarkus.otel.enabled=${GOLLEK_TRACING_ENABLED:true}
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
quarkus.otel.exporter.otlp.enabled=false

# Disable strict config validation for external modules
smallrye.config.mapping.validate-unknown=false

# =============================================================================
# Database Configuration
# =============================================================================
# Standalone/Demo Mode: Uses H2 in-memory database
# Enterprise Mode: Uses PostgreSQL with Dev Services (auto-provisioned in dev)

# -----------------------------------------------------------------------------
# Default: Dev Mode with PostgreSQL Dev Services (auto-provisioned)
# -----------------------------------------------------------------------------
# In dev mode, Quarkus will automatically start a PostgreSQL container
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.db-name=gollek

# Hibernate ORM Configuration (dev)
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# -----------------------------------------------------------------------------
# Production Mode: Manual PostgreSQL configuration
# -----------------------------------------------------------------------------
# Set these environment variables in production:
# - DB_USERNAME, DB_PASSWORD, DATABASE_URL
%prod.quarkus.datasource.username=${DB_USERNAME:postgres}
%prod.quarkus.datasource.password=${DB_PASSWORD:postgres}
%prod.quarkus.datasource.reactive.url=${DATABASE_URL:postgresql://localhost:5432/gollek}
%prod.quarkus.hibernate-orm.database.generation=${HIBERNATE_DB_GENERATION:validate}

# -----------------------------------------------------------------------------
# Standalone/Demo Mode: H2 in-memory database
# -----------------------------------------------------------------------------
%standalone.quarkus.datasource.db-kind=h2
%standalone.gollek.distribution.mode=standalone
%standalone.quarkus.datasource.username=sa
%standalone.quarkus.datasource.password=
%standalone.quarkus.datasource.jdbc.url=jdbc:h2:mem:gollek;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
%standalone.quarkus.datasource.devservices.enabled=false
%standalone.quarkus.hibernate-orm.database.generation=drop-and-create
%standalone.quarkus.hibernate-orm.dialect=org.hibernate.dialect.H2Dialect
%standalone.quarkus.micrometer.enabled=false
%standalone.quarkus.micrometer.export.prometheus.enabled=false
%standalone.quarkus.otel.enabled=true

%demo.quarkus.datasource.db-kind=h2
%demo.gollek.distribution.mode=demo
%demo.quarkus.datasource.username=sa
%demo.quarkus.datasource.password=
%demo.quarkus.datasource.jdbc.url=jdbc:h2:mem:gollek;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
%demo.quarkus.datasource.devservices.enabled=false
%demo.quarkus.hibernate-orm.database.generation=drop-and-create
%demo.quarkus.hibernate-orm.dialect=org.hibernate.dialect.H2Dialect
%demo.quarkus.micrometer.enabled=false
%demo.quarkus.micrometer.export.prometheus.enabled=false
%demo.quarkus.otel.enabled=true

# LiteRT session pool defaults (adaptive eviction telemetry-ready)
litert.provider.session.max-per-tenant=${LITERT_SESSION_MAX_PER_TENANT:4}
litert.provider.session.idle-timeout-seconds=${LITERT_SESSION_IDLE_TIMEOUT_SECONDS:300}
litert.provider.session.max-total=${LITERT_SESSION_MAX_TOTAL:16}

# Standalone/demo profiles use smaller pool limits by default
%standalone.litertprovider.session.max-per-tenant=${LITERT_SESSION_MAX_PER_TENANT_STANDALONE:2}
%standalone.litertprovider.session.max-total=${LITERT_SESSION_MAX_TOTAL_STANDALONE:8}
%demo.litertprovider.session.max-per-tenant=${LITERT_SESSION_MAX_PER_TENANT_DEMO:2}
%demo.litertprovider.session.max-total=${LITERT_SESSION_MAX_TOTAL_DEMO:8}

# LibTorch advanced CUDA path (feature-flagged, default OFF)
libtorch.provider.advanced.enabled=${LIBTORCH_ADVANCED_ENABLED:false}
libtorch.provider.advanced.attention-mode=${LIBTORCH_ADVANCED_ATTENTION_MODE:baseline}
libtorch.provider.advanced.fp8-rowwise-enabled=${LIBTORCH_ADVANCED_FP8_ROWWISE_ENABLED:false}
libtorch.provider.advanced.fp8-rowwise-allowed-tenants=${LIBTORCH_ADVANCED_FP8_ROWWISE_ALLOWED_TENANTS:}
libtorch.provider.advanced.fp8-rowwise-allowed-models=${LIBTORCH_ADVANCED_FP8_ROWWISE_ALLOWED_MODELS:}
libtorch.provider.advanced.fp8-rowwise-blocked-tenants=${LIBTORCH_ADVANCED_FP8_ROWWISE_BLOCKED_TENANTS:}
libtorch.provider.advanced.fp8-rowwise-blocked-models=${LIBTORCH_ADVANCED_FP8_ROWWISE_BLOCKED_MODELS:}
libtorch.provider.advanced.sage-attention2-enabled=${LIBTORCH_ADVANCED_SAGE2_ENABLED:false}
libtorch.provider.advanced.sage-attention2-allowed-tenants=${LIBTORCH_ADVANCED_SAGE2_ALLOWED_TENANTS:}
libtorch.provider.advanced.sage-attention2-allowed-models=${LIBTORCH_ADVANCED_SAGE2_ALLOWED_MODELS:}
libtorch.provider.advanced.sage-attention2-blocked-tenants=${LIBTORCH_ADVANCED_SAGE2_BLOCKED_TENANTS:}
libtorch.provider.advanced.sage-attention2-blocked-models=${LIBTORCH_ADVANCED_SAGE2_BLOCKED_MODELS:}
libtorch.provider.advanced.allowed-gpu-sm=${LIBTORCH_ADVANCED_ALLOWED_GPU_SM:89,90}

# Metal runners (Apple Silicon, feature-flagged)
gollek.runners.metal.enabled=${GOLLEK_METAL_ENABLED:false}
gollek.runners.metal-offload.enabled=${GOLLEK_METAL_OFFLOAD_ENABLED:false}
gollek.runners.metal.mode=${GOLLEK_METAL_MODE:auto}
