quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:gollek-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=

# Keep tests self-contained and avoid Docker dependency in CI.
quarkus.devservices.enabled=false
quarkus.datasource.devservices.enabled=false

# MeterRegistry is required by multiple beans during Quarkus bootstrap.
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=false

# Inference integration tests do not require persistence bootstrap.
quarkus.hibernate-orm.enabled=false
quarkus.hibernate-reactive.enabled=false

# Fix IllegalStateException: Persistence unit [<default>] uses Quarkus' main formatting facilities for JSON columns
quarkus.hibernate-orm.mapping.format.global=ignore

# Deactivate Redis for standalone integration tests
quarkus.redis.active=false
quarkus.cache.type=caffeine

# Disable real providers to use MockProvider
gguf.provider.enabled=false
safetensor.provider.enabled=false
libtorch.provider.enabled=false
onnx.provider.enabled=false
inference.providers.gguf.enabled=false
inference.providers.onnx.enabled=false
