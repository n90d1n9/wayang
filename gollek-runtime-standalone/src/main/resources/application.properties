# Gollek Standalone Runtime Configuration

# Application Info
quarkus.application.name=Gollek Standalone Runtime
quarkus.application.version=1.0.0-SNAPSHOT
gollek.distribution.mode=standalone

# CLI Configuration
quarkus.banner.enabled=false
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
quarkus.log.level=INFO
quarkus.log.category."tech.kayys.gollek".level=INFO

# Disable HTTP server for CLI-only mode
quarkus.http.port=-1
quarkus.http.test-port=-1



# Provider Configuration
gollek.providers.ollama.enabled=true
gollek.providers.litertenabled=true

# Ollama Configuration
quarkus.rest-client.ollama-api.url=${OLLAMA_URL:http://localhost:11434}
quarkus.rest-client.ollama-api.connect-timeout=5000
quarkus.rest-client.ollama-api.read-timeout=120000

# LiteRT Configuration
gollek.litertmodel-dir=${LITERT_MODEL_DIR:./models}
gollek.litertthread-count=${LITERT_THREADS:4}
litert.provider.session.max-per-tenant=${LITERT_SESSION_MAX_PER_TENANT:2}
litert.provider.session.idle-timeout-seconds=${LITERT_SESSION_IDLE_TIMEOUT_SECONDS:300}
litert.provider.session.max-total=${LITERT_SESSION_MAX_TOTAL:8}

# LibTorch advanced CUDA path (feature-flagged, default OFF)
libtorch.provider.advanced.enabled=${LIBTORCH_ADVANCED_ENABLED:false}
libtorch.provider.advanced.attention-mode=${LIBTORCH_ADVANCED_ATTENTION_MODE:baseline}
libtorch.provider.advanced.fp8-rowwise-enabled=${LIBTORCH_ADVANCED_FP8_ROWWISE_ENABLED:false}
libtorch.provider.advanced.fp8-rowwise-allowed-tenants=${LIBTORCH_ADVANCED_FP8_ROWWISE_ALLOWED_TENANTS:}
libtorch.provider.advanced.fp8-rowwise-allowed-models=${LIBTORCH_ADVANCED_FP8_ROWWISE_ALLOWED_MODELS:}
libtorch.provider.advanced.fp8-rowwise-blocked-tenants=${LIBTORCH_ADVANCED_FP8_ROWWISE_BLOCKED_TENANTS:}
libtorch.provider.advanced.fp8-rowwise-blocked-models=${LIBTORCH_ADVANCED_FP8_ROWWISE_BLOCKED_MODELS:}
libtorch.provider.advanced.sage-attention2-enabled=${LIBTORCH_ADVANCED_SAGE2_ENABLED:false}
libtorch.provider.advanced.sage-attention2-allowed-tenants=${LIBTORCH_ADVANCED_SAGE2_ALLOWED_TENANTS:}
libtorch.provider.advanced.sage-attention2-allowed-models=${LIBTORCH_ADVANCED_SAGE2_ALLOWED_MODELS:}
libtorch.provider.advanced.sage-attention2-blocked-tenants=${LIBTORCH_ADVANCED_SAGE2_BLOCKED_TENANTS:}
libtorch.provider.advanced.sage-attention2-blocked-models=${LIBTORCH_ADVANCED_SAGE2_BLOCKED_MODELS:}
libtorch.provider.advanced.allowed-gpu-sm=${LIBTORCH_ADVANCED_ALLOWED_GPU_SM:89,90}

# Metal runners (Apple Silicon, feature-flagged)
gollek.runners.metal.enabled=${GOLLEK_METAL_ENABLED:false}
gollek.runners.metal-offload.enabled=${GOLLEK_METAL_OFFLOAD_ENABLED:false}
gollek.runners.metal.mode=${GOLLEK_METAL_MODE:auto}

# Observability (minimal for CLI)
quarkus.log.console.json.enabled=false
quarkus.micrometer.enabled=${GOLLEK_METRICS_ENABLED:true}
quarkus.micrometer.export.prometheus.enabled=${GOLLEK_PROMETHEUS_ENABLED:true}
quarkus.opentelemetry.enabled=${GOLLEK_TRACING_ENABLED:true}
quarkus.opentelemetry.tracer.exporter=none
quarkus.opentelemetry.metrics.exporter=none
quarkus.opentelemetry.logs.exporter=none

# Suppress unknown config key validation from bundled extension JARs
smallrye.config.mapping.validate-unknown=false

# =============================================================================
# Database Configuration
# =============================================================================
# Standalone/Demo Mode: Uses H2 in-memory database (default)
# Enterprise Mode: Uses PostgreSQL (set QUARKUS_DATASOURCE_DB_KIND=postgresql)

# -----------------------------------------------------------------------------
# Default: H2 in-memory database for standalone mode
# -----------------------------------------------------------------------------
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:gollek;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.devservices.enabled=false

# Hibernate ORM Configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# -----------------------------------------------------------------------------
# Production Mode: PostgreSQL configuration
# -----------------------------------------------------------------------------
# Set these environment variables in production:
# - DB_USERNAME, DB_PASSWORD, DATABASE_URL
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USERNAME:postgres}
%prod.quarkus.datasource.password=${DB_PASSWORD:postgres}
%prod.quarkus.datasource.reactive.url=${DATABASE_URL:postgresql://localhost:5432/gollek}
%prod.quarkus.hibernate-orm.database.generation=${HIBERNATE_DB_GENERATION:validate}
