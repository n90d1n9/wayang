# CDI disambiguation for wayang-api-grpc: exclude conflicting beans.
# 
# ObjectMapper: Quarkus (io.quarkus.jackson.runtime.ObjectMapperProducer) is the canonical producer.
#   Exclude the duplicates from safetensor and local-sdk.
#
# ProviderRegistry: GollekProviderRegistry (gollek-engine) is preferred.
#   Exclude DefaultProviderRegistry from gollek-provider-core.
#
# GollekSdk: LocalGollekSdk (@DefaultBean) is the intended SDK for the API layer.
#   Exclude SafetensorGollekSdk which is a lower-level engine wrapper.
#
# NOTE: SystemModule is NOT excluded — it provides RequestConfigRepository and RunnerMetrics
#       beans needed by ModelRouterService and SelectionPolicy.
quarkus.arc.exclude-types=\
  tech.kayys.gollek.safetensor.config.SafetensorConfigProducer,\
  tech.kayys.gollek.sdk.local.LocalGollekSdkProvider,\
  tech.kayys.gollek.provider.core.DefaultProviderRegistry,\
  tech.kayys.gollek.safetensor.engine.sdk.SafetensorGollekSdk
