# ─────────────────────────────────────────────────────────────────────────────
# Gamelan CLI — Application Configuration
# Override via env var (GAMELAN_MODEL) or: gamelan config set <key> <value>
# ─────────────────────────────────────────────────────────────────────────────

quarkus:
  application:
    name: gamelan-cli
    version: 1.0.0
  banner:
    enabled: false
  log:
    level: WARN
    category:
      "tech.kayys.gamelan":
        level: INFO
      "tech.kayys.gollek":
        level: WARN
  picocli:
    native:
      enabled: true

# ─────────────────────────────────────────────────────────────────────────────
gamelan:

  # LLM model
  default:
    model: "${GAMELAN_MODEL:llama3}"

  # Skills directory (agentskills.io)
  skills:
    dir: "${GAMELAN_SKILLS_DIR:}"           # empty → ~/.gamelan/skills

  # Context window management
  token:
    budget: 6000                            # max history tokens before trimming
  history:
    size: 50

  # Streaming
  stream:
    default: true

  # LLM parameters
  temperature: 0.7
  max:
    tokens: 4096

  # Engine selection
  engine:
    mode: "${GAMELAN_ENGINE_MODE:auto}"     # auto | local | remote
  remote:
    url:  "${GAMELAN_REMOTE_URL:}"
  api:
    key:  "${GAMELAN_API_KEY:community}"

  # Timeouts
  request:
    timeout:
      seconds: 120

  # Session & memory
  session:
    persist: false
  memory:
    max-entries: 100                        # max stored memories per project

  # Terminal
  color: true

  # Tool safety
  tool:
    command:
      allowed-prefix: ""
      timeout:
        seconds: 60
    read:
      max-bytes: 200000

# ─────────────────────────────────────────────────────────────────────────────
"%dev":
  quarkus:
    log:
      level: DEBUG
      category:
        "tech.kayys.gamelan":
          level: DEBUG
  gamelan:
    engine:
      mode: remote
    remote:
      url: "http://localhost:8080"

"%test":
  quarkus:
    log:
      level: WARN
  gamelan:
    engine:
      mode: remote
    remote:
      url: "http://localhost:18080"
